name: CI

# Provider-neutral enforcement layer. Multiple AI toolchains commit to this
# repo (see AGENTS.md); CI is what keeps lint/format/test parity honest across
# all of them. Keep the checks here in sync with AGENTS.md "Commands".

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src/ scripts/ tests/

      - name: Black (format check)
        run: black --check src/ scripts/ tests/

      - name: Pytest (unit + data-quality, integration deselected)
        run: pytest -m "not integration"
