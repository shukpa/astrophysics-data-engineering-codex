# Agentic Galactic Discovery — Planning Configuration (NOT loaded at runtime)
#
# ┌───────────────────────────────────────────────────────────────────────────┐
# │ SINGLE SOURCE OF TRUTH                                                     │
# │                                                                           │
# │ Runtime configuration lives ONLY in `src/utils/config.py` (Pydantic       │
# │ settings, overridable via environment variables / .env). Nothing loads    │
# │ this file today.                                                          │
# │                                                                           │
# │ This file is a *planning reference* for configuration that future phases  │
# │ (see AGD_FORWARD_PLAN.md) will implement in Pydantic. It intentionally     │
# │ contains ONLY values that have no code home yet. It must NOT duplicate     │
# │ any value already defined in `src/utils/config.py` or in processor code   │
# │ (e.g. the silver rejection thresholds live in                             │
# │ `src/processing/silver_processor.py`).                                    │
# │                                                                           │
# │ When a phase implements one of these sections, move it into Pydantic and  │
# │ delete it here so there is never a second source of truth.                │
# └───────────────────────────────────────────────────────────────────────────┘

# NOTE: the former `crossmatch:` section was implemented in Phase 1
# (feat/gold-crossref) as CrossmatchSettings and deleted here.
# NOTE: the former `classification:` taxonomy, agent thresholds, and
# `output.nightly_digest` sections were implemented in Phase 4
# (feat/anomaly-agent) as ClassificationSettings / AnomalySettings /
# ReportSettings in src/utils/config.py and deleted here. The Phase 4
# classifier and anomaly agent are deterministic (no LLM in any path yet);
# only the *LLM runtime* placeholders below remain unimplemented.

# =============================================================================
# LLM runtime placeholders (no code home yet — no provider/runtime selected).
# Provider-neutral: "model" is resolved by whichever runtime the operator
# selects (see AGENTS.md). These become real config only if/when a phase adds
# an LLM-backed warm-path assessor on top of the deterministic anomaly agent.
# =============================================================================
llm_runtime:
  triage:
    model: "provider-model"
    max_tokens: 1000
    temperature: 0.2
  anomaly:
    model: "provider-model"
    max_tokens: 3000
    temperature: 0.4

# =============================================================================
# Notification channels (Phase 4 report is file-based; delivery unimplemented)
# =============================================================================
notifications:
  channels:
    slack:
      enabled: false
    discord:
      enabled: false
