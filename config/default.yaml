# Agentic Galactic Discovery — Planning Configuration (NOT loaded at runtime)
#
# ┌───────────────────────────────────────────────────────────────────────────┐
# │ SINGLE SOURCE OF TRUTH                                                     │
# │                                                                           │
# │ Runtime configuration lives ONLY in `src/utils/config.py` (Pydantic       │
# │ settings, overridable via environment variables / .env). Nothing loads    │
# │ this file today.                                                          │
# │                                                                           │
# │ This file is a *planning reference* for configuration that future phases  │
# │ (see AGD_FORWARD_PLAN.md) will implement in Pydantic. It intentionally     │
# │ contains ONLY values that have no code home yet. It must NOT duplicate     │
# │ any value already defined in `src/utils/config.py` or in processor code   │
# │ (e.g. the silver rejection thresholds live in                             │
# │ `src/processing/silver_processor.py`).                                    │
# │                                                                           │
# │ When a phase implements one of these sections, move it into Pydantic and  │
# │ delete it here so there is never a second source of truth.                │
# └───────────────────────────────────────────────────────────────────────────┘

# =============================================================================
# Catalog cross-match (Phase 1 — feat/gold-crossref; not yet implemented)
# Gaia DR3 / SIMBAD cone-search defaults for the gold cross-reference layer.
# =============================================================================
crossmatch:
  simbad:
    timeout_seconds: 30
    default_radius_arcsec: 5.0
  gaia:
    catalog: "gaiadr3.gaia_source"
    timeout_seconds: 60
    default_radius_arcsec: 5.0
  # Radius used when associating silver transients with catalog / lens fields.
  cross_reference_radius_arcsec: 5.0

# =============================================================================
# Agent configuration (Phase 4 — feat/anomaly-agent; not yet implemented)
# Provider-neutral: "model" is a placeholder resolved by the runtime the
# operator selects (see AGENTS.md — no provider is baked in).
# =============================================================================
agents:
  triage:
    model: "provider-model"
    max_tokens: 1000
    temperature: 0.2
    high_confidence_threshold: 0.85
    anomaly_score_threshold: 0.7

  anomaly:
    model: "provider-model"
    max_tokens: 3000
    temperature: 0.4
    outlier_sigma_threshold: 3.0
    minimum_detections_for_analysis: 5

# =============================================================================
# Classification taxonomy (used by future triage / reporting)
# =============================================================================
classification:
  # Priority levels for follow-up
  priority_levels:
    CRITICAL: "Potentially new/anomalous — requires immediate human review"
    HIGH: "Scientifically valuable known type — spectroscopic follow-up recommended"
    MEDIUM: "Interesting but not urgent — queue for nightly review"
    LOW: "Well-characterized known type — archive only"

  # Known transient classes (aligned with Fink classifications)
  known_classes:
    - "SN candidate"
    - "Early SN Ia candidate"
    - "SN Ia"
    - "SN II"
    - "Kilonova candidate"
    - "Microlensing candidate"
    - "AGN"
    - "QSO"
    - "Variable Star"
    - "Cataclysmic Variable"
    - "YSO"
    - "Solar System MPC"
    - "Solar System candidate"

# =============================================================================
# Output & notifications (Phase 4 — nightly report; not yet implemented)
# =============================================================================
output:
  nightly_digest:
    enabled: true
    generation_time_utc: "12:00"   # Noon UTC, after most northern-hemisphere nights
    include_top_n_events: 20
    include_anomaly_summary: true

  notifications:
    # Only notify for HIGH and CRITICAL priority
    minimum_priority: "HIGH"
    channels:
      slack:
        enabled: false
      discord:
        enabled: false
